name: Frontend CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-typecheck-build:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          CI: 'true'

      - name: Upload dist bundle
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
          if-no-files-found: error

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint-typecheck-build
    # E2E nécessitera un backend dockerisé pour être pleinement fonctionnel.
    # En attendant, on l'exécute en best-effort : un échec ne bloque pas la PR.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start preview server
        run: |
          npm run build
          npx vite preview --port 5173 --host 127.0.0.1 &
          npx wait-on http://127.0.0.1:5173 --timeout 60000
        env:
          CI: 'true'

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore

  ready-to-merge:
    name: Ready to merge
    runs-on: ubuntu-latest
    needs: [lint-typecheck-build]
    if: always()
    steps:
      - name: Verify required jobs passed
        run: |
          if [[ "${{ needs.lint-typecheck-build.result }}" != "success" ]]; then
            echo "Required job failed."
            exit 1
          fi
          echo "All required checks passed — branch is ready to merge."
